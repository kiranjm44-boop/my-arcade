<!DOCTYPE html>
<html>
<head>
  <title>Snake</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      font-family: sans-serif;
    }
    canvas { background: #0f3460; border: 2px solid #16213e; }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const grid = 20;
    const tiles = canvas.width / grid;

    let snake = [{ x: 10, y: 10 }];
    let velocity = { x: 0, y: 0 };
    let food = { x: 15, y: 15 };
    let score = 0;

    document.addEventListener('keydown', (e) => {
      const moves = {
        ArrowUp:    { x: 0, y: -1 },
        ArrowDown:  { x: 0, y: 1 },
        ArrowLeft:  { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
      };
      const move = moves[e.key];
      // Prevent reversing into yourself
      if (move && !(move.x === -velocity.x && move.y === -velocity.y)) {
        velocity = move;
      }
    });

    function gameLoop() {
      const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };
      snake.unshift(head);

      // Eat food → grow; otherwise remove tail
      if (head.x === food.x && head.y === food.y) {
        score++;
        food = {
          x: Math.floor(Math.random() * tiles),
          y: Math.floor(Math.random() * tiles),
        };
      } else {
        snake.pop();
      }

      // Collision with walls or self → restart
      const hitWall = head.x < 0 || head.x >= tiles || head.y < 0 || head.y >= tiles;
      const hitSelf = snake.slice(1).some(s => s.x === head.x && s.y === head.y);
      if (hitWall || hitSelf) {
        snake = [{ x: 10, y: 10 }];
        velocity = { x: 0, y: 0 };
        score = 0;
      }

      // Draw everything
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#e94560';
      ctx.fillRect(food.x * grid, food.y * grid, grid - 2, grid - 2);

      ctx.fillStyle = '#16c79a';
      snake.forEach(s => ctx.fillRect(s.x * grid, s.y * grid, grid - 2, grid - 2));

      ctx.fillStyle = 'white';
      ctx.font = '20px sans-serif';
      ctx.fillText('Score: ' + score, 10, 25);
    }

    setInterval(gameLoop, 100);
  </script>
</body>
</html>
