<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crawling Baby - Mini Arcade</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="game-body">
  <a href="../index.html" class="back-link">← Back to games</a>
  <canvas id="game" width="400" height="500"></canvas>
  <p class="hint">Space / Click / ↑ to jump, ↓ to duck. Grab bottles for bonus points! 🍼</p>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Game constants
    const GRAVITY = 0.7;
    const JUMP = -13;
    const FLOOR_Y = canvas.height - 60;
    const SPEED = 3.5;
    const OBSTACLE_SPACING = 260;
    const BABY_X = 80;
    const BABY_SIZE = 34;      // emoji font size, used for hitbox too
    const DUCK_SIZE = 22;      // smaller hitbox while ducking
    const BOTTLE_R = 12;

    // Obstacle types
    const TABLE = { w: 46, h: 52, kind: 'table' };   // jump over
    const GATE = { w: 34, kind: 'gate' };            // duck under (hovers above floor)
    const GATE_CLEARANCE = 30;                       // gap between floor and gate bottom

    // Game state
    let baby, obstacles, bottles, score, best = 0;
    let state = 'start'; // start → playing → over

    function reset() {
      baby = { y: FLOOR_Y, vy: 0, ducking: false };
      obstacles = [];
      bottles = [];
      score = 0;
    }

    function startOrRestart() {
      if (state === 'start' || state === 'over') {
        state = 'playing';
        reset();
      }
    }

    function jump() {
      if (state !== 'playing') return startOrRestart();
      if (baby.y >= FLOOR_Y) {
        baby.ducking = false;
        baby.vy = JUMP;
      }
    }

    function setDuck(on) {
      if (state !== 'playing') return;
      baby.ducking = on && baby.y >= FLOOR_Y;
    }

    canvas.addEventListener('mousedown', jump);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        jump();
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        setDuck(true);
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowDown') setDuck(false);
    });

    function spawnObstacle() {
      const isGate = Math.random() < 0.5;
      if (isGate) {
        obstacles.push({ x: canvas.width, ...GATE, y: FLOOR_Y - GATE_CLEARANCE - 110, h: 110 });
      } else {
        obstacles.push({ x: canvas.width, ...TABLE, y: FLOOR_Y - TABLE.h });
      }
      // Occasionally float a bottle above the floor between obstacles
      if (Math.random() < 0.4) {
        bottles.push({
          x: canvas.width + OBSTACLE_SPACING / 2,
          y: FLOOR_Y - 40 - Math.random() * 60,
        });
      }
    }

    function babyHitbox() {
      const size = baby.ducking ? DUCK_SIZE : BABY_SIZE;
      return {
        left: BABY_X - size / 2,
        right: BABY_X + size / 2,
        top: baby.y - size,
        bottom: baby.y,
      };
    }

    function update() {
      if (state !== 'playing') return;

      // Baby physics (jump arc, always returns to floor)
      baby.vy += GRAVITY;
      baby.y += baby.vy;
      if (baby.y > FLOOR_Y) {
        baby.y = FLOOR_Y;
        baby.vy = 0;
      }

      // Spawn obstacles
      if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - OBSTACLE_SPACING) {
        spawnObstacle();
      }

      // Move obstacles + score
      for (const ob of obstacles) {
        ob.x -= SPEED;
        if (!ob.scored && ob.x + ob.w < BABY_X) {
          ob.scored = true;
          score++;
        }
      }
      obstacles = obstacles.filter(o => o.x + o.w > 0);

      // Move bottles + collect (bonus point)
      for (const bottle of bottles) {
        bottle.x -= SPEED;
        const hb = babyHitbox();
        if (
          bottle.x + BOTTLE_R > hb.left && bottle.x - BOTTLE_R < hb.right &&
          bottle.y + BOTTLE_R > hb.top && bottle.y - BOTTLE_R < hb.bottom
        ) {
          bottle.collected = true;
          score++;
        }
      }
      bottles = bottles.filter(b => !b.collected && b.x + BOTTLE_R > 0);

      // Collisions
      const hb = babyHitbox();
      for (const ob of obstacles) {
        const hit =
          hb.right > ob.x && hb.left < ob.x + ob.w &&
          hb.bottom > ob.y && hb.top < ob.y + ob.h;
        if (hit) return gameOver();
      }
    }

    function gameOver() {
      state = 'over';
      best = Math.max(best, score);
    }

    function draw() {
      // Sky
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Floor
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);
      ctx.strokeStyle = '#e94560';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, FLOOR_Y);
      ctx.lineTo(canvas.width, FLOOR_Y);
      ctx.stroke();

      // Obstacles
      for (const ob of obstacles) {
        if (ob.kind === 'table') {
          // Wooden table: top + legs
          ctx.fillStyle = '#e0b088';
          ctx.fillRect(ob.x, ob.y, ob.w, 10);
          ctx.fillRect(ob.x + 4, ob.y + 10, 6, ob.h - 10);
          ctx.fillRect(ob.x + ob.w - 10, ob.y + 10, 6, ob.h - 10);
        } else {
          // Baby gate hovering above the floor
          ctx.fillStyle = '#e0b088';
          ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
          ctx.fillStyle = '#0f3460';
          for (let y = ob.y + 10; y < ob.y + ob.h - 8; y += 16) {
            ctx.fillRect(ob.x + 4, y, ob.w - 8, 6);
          }
        }
      }

      // Bottles
      ctx.font = `${BOTTLE_R * 2}px "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const bottle of bottles) {
        ctx.fillText('🍼', bottle.x, bottle.y);
      }

      // Baby (squashed while ducking = crawling low)
      ctx.font = `${BABY_SIZE}px "Segoe UI", sans-serif`;
      if (baby.ducking) {
        ctx.save();
        ctx.translate(BABY_X, baby.y - DUCK_SIZE / 2);
        ctx.scale(1, 0.65);
        ctx.fillText('👶', 0, 0);
        ctx.restore();
      } else {
        ctx.fillText('👶', BABY_X, baby.y - BABY_SIZE / 2);
      }

      // Score
      ctx.fillStyle = 'white';
      ctx.font = 'bold 28px "Segoe UI", sans-serif';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(score, canvas.width / 2, 50);

      // Overlays
      if (state === 'start') {
        ctx.font = '20px "Segoe UI", sans-serif';
        ctx.fillText('Click or press Space to start', canvas.width / 2, canvas.height / 2 - 40);
      } else if (state === 'over') {
        ctx.font = 'bold 32px "Segoe UI", sans-serif';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 50);
        ctx.font = '20px "Segoe UI", sans-serif';
        ctx.fillText(`Score: ${score}   Best: ${best}`, canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillText('Click or press Space to restart', canvas.width / 2, canvas.height / 2 + 30);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    reset();
    loop();
  </script>
</body>
</html>
