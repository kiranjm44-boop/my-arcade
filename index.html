<body>
  <header>
    <h1>🎮 Mini Arcade</h1>

      <div class="game-icon">🐍</div>
      <h2>Snake</h2>
      <p>Eat food, grow long, don't crash!</p>

    <a href="games/reaction.html" class="game-card">
      <div class="game-icon">⚡</div>
      <h2>Reaction Test</h2>

    <a href="games/flappy.html" class="game-card">
      <div class="game-icon">🐦</div>
      <h2>Flappy</h2>
      <p>Flap through the pipes!</p>

    <a href="games/flappy-baby.html" class="game-card">
      <div class="game-icon">👶</div>
      <h2>Crawling Baby</h2>

    <!-- Add new game cards here -->
